<!DOCTYPE html>
<html>
<body style="background:#222;display:flex;flex-direction:column;align-items:center;padding:40px;font-family:sans-serif;color:white">
  <h2>Right-click the image below and "Save image as..." to get a PNG</h2>
  <canvas id="c" width="512" height="512"></canvas>
  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1e3a5f"/>
          <stop offset="100%" style="stop-color:#2563eb"/>
        </linearGradient>
        <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.3"/>
          <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="112" fill="url(#bg)"/>
      <ellipse cx="256" cy="220" rx="160" ry="120" fill="url(#glow)"/>
      <path d="M256 180 C256 180 200 165 140 175 C120 178 105 188 105 205 L105 340 C105 350 115 358 135 355 C195 345 256 360 256 360 Z" fill="white" opacity="0.95"/>
      <path d="M256 180 C256 180 312 165 372 175 C392 178 407 188 407 205 L407 340 C407 350 397 358 377 355 C317 345 256 360 256 360 Z" fill="white" opacity="0.85"/>
      <line x1="256" y1="175" x2="256" y2="362" stroke="#2563eb" stroke-width="3" opacity="0.4"/>
      <line x1="135" y1="215" x2="235" y2="210" stroke="#2563eb" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
      <line x1="130" y1="235" x2="240" y2="230" stroke="#2563eb" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
      <line x1="125" y1="255" x2="242" y2="250" stroke="#2563eb" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
      <line x1="122" y1="275" x2="244" y2="270" stroke="#2563eb" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
      <line x1="120" y1="295" x2="245" y2="290" stroke="#2563eb" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
      <line x1="277" y1="210" x2="377" y2="215" stroke="#2563eb" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
      <line x1="272" y1="230" x2="382" y2="235" stroke="#2563eb" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
      <line x1="270" y1="250" x2="387" y2="255" stroke="#2563eb" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
      <line x1="268" y1="270" x2="390" y2="275" stroke="#2563eb" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
      <line x1="267" y1="290" x2="392" y2="295" stroke="#2563eb" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
      <line x1="256" y1="160" x2="256" y2="120" stroke="#93c5fd" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
      <line x1="256" y1="160" x2="220" y2="128" stroke="#93c5fd" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
      <line x1="256" y1="160" x2="292" y2="128" stroke="#93c5fd" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
      <line x1="256" y1="160" x2="190" y2="140" stroke="#93c5fd" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
      <line x1="256" y1="160" x2="322" y2="140" stroke="#93c5fd" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
      <text x="256" y="425" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="8" opacity="0.9">SS</text>
    </svg>`;
    const img = new Image();
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      const c = document.getElementById('c');
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 512, 512);
      URL.revokeObjectURL(url);
    };
    img.src = url;
  </script>
</body>
</html>
